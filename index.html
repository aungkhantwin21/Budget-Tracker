<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Budget Tracker</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Hero Section -->
  <header class="hero d-flex flex-column justify-content-center align-items-center text-center text-white">
    <h1 class="display-4 fw-bold">💰 My Budget Tracker</h1>
    <p class="lead">Track your income and expenses in style</p>
  </header>

  <main class="container py-4">

    <!-- Balance Overview -->
    <div class="row text-center mb-4 g-3">
      <div class="col-12 col-md-4">
        <div class="card shadow bg-success text-white h-100">
          <div class="card-body">
            <h5>Total Income</h5>
            <h3 id="total-income">$0</h3>
          </div>
        </div>
      </div>
      <div class="col-12 col-md-4">
        <div class="card shadow bg-danger text-white h-100">
          <div class="card-body">
            <h5>Total Expense</h5>
            <h3 id="total-expense">$0</h3>
          </div>
        </div>
      </div>
      <div class="col-12 col-md-4">
        <div class="card shadow bg-primary text-white h-100">
          <div class="card-body">
            <h5>Balance</h5>
            <h3 id="balance">$0</h3>
          </div>
        </div>
      </div>
    </div>

    <!-- Form to Add Transaction -->
    <form id="transaction-form" class="row g-2 mb-4">
      <div class="col-12 col-md-4">
        <input type="text" id="description" class="form-control" placeholder="Description" required>
      </div>
      <div class="col-12 col-md-3">
        <input type="number" id="amount" class="form-control" placeholder="Amount" required>
      </div>
      <div class="col-12 col-md-3">
        <select id="type" class="form-select" required>
          <option value="">Type</option>
          <option value="income">Income</option>
          <option value="expense">Expense</option>
        </select>
      </div>
      <div class="col-12 col-md-2 d-grid">
        <button type="submit" class="btn btn-dark">Add</button>
      </div>
    </form>

    <!-- Transaction Table -->
    <div class="table-responsive shadow">
      <table class="table table-striped table-hover">
        <thead class="table-dark">
          <tr>
            <th>Description</th>
            <th>Amount</th>
            <th>Type</th>
            <th>Date</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="transaction-list"></tbody>
      </table>
    </div>
  </main>

  <footer class="text-center text-white py-3">
    &copy; 2025 Budget Tracker
  </footer>

  <script src="app.js"></script>
</body>
</html>
